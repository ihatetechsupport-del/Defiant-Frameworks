<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Defiant Frameworks Lab</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&display=swap"
    rel="stylesheet"
  >

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      overflow: hidden;
      background:
        #2b2e30
        url("./hero.jpeg")
        center center / cover
        no-repeat;
      color: #fff;
      font-family: "Caveat", cursive;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(15, 17, 18, 0.12);
      pointer-events: none;
      z-index: 0;
    }

    .message {
      position: fixed;
      z-index: 1;
      top: 17%;
      left: 50%;
      width: min(90vw, 680px);
      transform: translateX(-50%);
      text-align: center;
      color: #fff;
      text-shadow:
        0 2px 5px rgba(0, 0, 0, 0.9),
        0 4px 16px rgba(0, 0, 0, 0.75);
    }

    .note {
      font-size: clamp(27px, 4.3vw, 46px);
      line-height: 1.15;
      font-weight: 600;
    }

    .sig {
      margin-top: 12px;
      font-size: clamp(23px, 3vw, 34px);
      line-height: 1;
      font-weight: 500;
    }

    @media (max-width: 700px) {
      body {
        background-position: center center;
      }

      .message {
        top: 13%;
        width: 88vw;
      }

      .note {
        font-size: clamp(25px, 7.5vw, 38px);
      }

      .sig {
        font-size: clamp(22px, 6vw, 30px);
      }
    }
  </style>
</head>

<body>
  <main class="message">
    <p class="note">
      Building something that's gonna knock your socks off.
      Hang tight. It's gonna be rad.
    </p>

    <p class="sig">— Noah</p>
  </main>
</body>
</html>
